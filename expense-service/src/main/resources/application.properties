spring.application.name=expense
server.port=2704

spring.kafka.producer.bootstrap-servers=${KAFKA_HOST}:${KAFKA_PORT}
spring.kafka.producer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.value-deserializer=com.Expense_Tracker.expense.Consumer.Deserializer
spring.kafka.producer.properties.spring.jason.type.mapping=com.Expense_Tracker.expense.Model.ExpenseDto
spring.kafka.topic.json.name=${KAFKA_TOPIC_NAME}
spring.kafka.consumer.group.id=e${KAFKA_CONSUMER_GROUP_ID}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DB}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.hbm2ddl.auto=update

