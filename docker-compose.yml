services:
  zookeeper:
    image: zookeeper:3.9
    environment:
      ZOO_TICK_TIME: 2000
    ports:
      - '2181:2181'

  kafka:
    image: confluentinc/cp-kafka:7.2.15
    depends_on:
      - zookeeper
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  mysql:
    image: mysql:8.0.43
    container_name: mysql-8.0.43
    ports:
      - '3306:3306'
    expose:
      - 3306
    environment:
      MYSQL_USER: test
      MYSQL_PASSWORD: 'root'
      MYSQL_ROOT_PASSWORD: 'root'
    volumes:
      - mysql-db:/var/lib/mysql

  auth-service:
    build:
      context: ./auth-service
    image: wishnu3594/auth-service:latest
    container_name: auth-service
    environment:
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: authservice
      MYSQL_USER: root
      MYSQL_PASSWORD: root
    ports:
      - '8081:8081'
    depends_on:
      - kafka
      - mysql

  user-service:
    build:
      context: ./user-service
    image: wishnu3594/user-service:latest
    container_name: user-service
    environment:
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: userservice
      MYSQL_USER: root
      MYSQL_PASSWORD: root
    ports:
      - '1906:1906'
    depends_on:
      - kafka
      - mysql

  expense-service:
    build:
      context: ./expense-service
    image: wishnu3594/expense-service:latest
    container_name: expense-service
    ports:
      - '2704:2704'
    environment:
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: ExpenseService
      MYSQL_USER: root
      MYSQL_PASSWORD: root
    depends_on:
      - kafka
      - mysql

  kong:
    image: kong
    volumes:
      - "./kong/kong.yml:/usr/local/kong/declarative/kong.yml"
    environment:
      KONG_DATABASE: off
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stdout
      KONG_ADMIN_ERROR_LOG: /dev/stdout
      KONG_ADMIN_LISTEN: 0.0.0.0:8001,0.0.0.0:8444 ssl
      KONG_LOG_LEVEL: debug
      KONG_PLUGINS: bundled
    ports:
      - "8005:8000/tcp"
      - "127.0.0.1:7990:8001/tcp"
      - "8443:8443/tcp"
      - "127.0.0.1:8444:8444/tcp"
    depends_on:
      - auth-service
      - user-service
      - expense-service

volumes:
  mysql-db:
    driver: local


